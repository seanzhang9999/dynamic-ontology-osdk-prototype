services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile.api
    command:
      - uvicorn
      - trusted_data_demo.gateway_app:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
    environment:
      GATEWAY_PROVIDER_INTERNAL_KEY: demo_gateway_provider_key
      PROVIDER_RUNTIME_ROUTES: '{"grid":"http://grid-runtime:8000","integrated-energy":"http://integrated-energy-runtime:8000","changchun":"http://changchun-runtime:8000"}'
    ports:
      - "8000:8000"
    depends_on:
      - grid-runtime
      - integrated-energy-runtime
      - changchun-runtime

  grid-runtime:
    build:
      context: .
      dockerfile: Dockerfile.api
    command:
      - uvicorn
      - trusted_data_demo.provider_app:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
    environment:
      DEMO_PROVIDER_ID: grid
      GATEWAY_PROVIDER_INTERNAL_KEY: demo_gateway_provider_key
    ports:
      - "8010:8000"

  integrated-energy-runtime:
    build:
      context: .
      dockerfile: Dockerfile.api
    command:
      - uvicorn
      - trusted_data_demo.provider_app:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
    environment:
      DEMO_PROVIDER_ID: integrated-energy
      GATEWAY_PROVIDER_INTERNAL_KEY: demo_gateway_provider_key
    ports:
      - "8011:8000"

  changchun-runtime:
    build:
      context: .
      dockerfile: Dockerfile.api
    command:
      - uvicorn
      - trusted_data_demo.provider_app:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
    environment:
      DEMO_PROVIDER_ID: changchun
      GATEWAY_PROVIDER_INTERNAL_KEY: demo_gateway_provider_key
    ports:
      - "8012:8000"

  legacy-demo:
    build:
      context: .
      dockerfile: Dockerfile.api
    command:
      - uvicorn
      - trusted_data_demo.app:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
    ports:
      - "8090:8000"

  demo-console:
    build:
      context: ./ui/demo-console
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8090
    ports:
      - "5173:80"
    depends_on:
      - legacy-demo
